<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>USCSS PORTFOLIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { overflow: hidden; }
    #app { width: 100vw; height: 100vh; position: relative; animation: glitchJitter 10s infinite; }
  </style>
</head>
<body data-namespace="index" data-barba="wrapper">

  <!-- Loading -->
  <div id="loading">
    <div style="margin-bottom:14px; letter-spacing:3px">INITIALIZING SYSTEM...</div>
    <div class="bar"><div class="fill"></div></div>
  </div>

  <!-- Cursor -->
  <div id="cursor"></div>

  <!-- Three.js Canvas Host (OUTSIDE barba container — survives nav) -->
  <div id="three-canvas-host"></div>

  <!-- VHS Filter -->
  <div id="vhs-filter">
    <div id="vhs-chroma"></div>
    <div id="vhs-tracking"></div>
    <div id="vhs-bleed"></div>
  </div>
  <div id="crt"></div>

  <!-- HUD -->
  <div class="hud tl">
    <div class="mode" id="modeDisplay">CLIENTS</div>
    <div>SYS: OPERATIONAL</div>
    <div>PWR: █ NOMINAL</div>
  </div>
  <div class="hud tc">SCROLL OUT<br><span style="font-size:10px; opacity:0.7;">RIGHT CLICK FOR BACKGROUND MUSIC</span></div>
  <div class="hud tr">
    <div>WEYLAND-YUTANI CORP</div>
    <div>USCSS PORTFOLIO</div>
    <div>ID: <span id="ts"></span></div>
  </div>
  <div class="hud bl">
    <div>CURSOR: <span id="xy">X:0 Y:0</span></div>
    <div>MODE: NAVIGATION</div>
    <div>ZOOM: <span id="zoomLevel">0%</span></div>
  </div>
  <div class="hud bc">MOVE CURSOR TO ROTATE // SCROLL TO ZOOM // CLICK TO ACCESS</div>

  <!-- Channel HUD (transition overlay) -->
  <div id="channel-hud"></div>

  <!-- Channel Sweep Canvas -->
  <canvas id="channel-sweep"></canvas>

  <!-- Navigation -->
  <nav class="page-nav">
    <a href="index.html" class="active">BROADCAST</a>
    <a href="clients.html">CLIENTS</a>
    <a href="personal.html">PERSONAL</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html">TRANSMIT</a>
  </nav>

  <!-- Barba Container -->
  <main data-barba="container" data-barba-namespace="index">
    <div id="app"></div>
  </main>

  <!-- Dossier Pull Animation -->
  <div id="dossier-pull">
    <div class="dossier-terminal"></div>
  </div>

  <!-- Case File Overlay (shared) -->
  <div id="case-file">
    <div class="case-backdrop" onclick="closeCaseFile()"></div>
    <div class="case-content">
      <div class="case-header">
        <div class="case-title"></div>
        <button class="case-close" onclick="closeCaseFile()">[X] TERMINATE FILE</button>
      </div>
      <div class="case-image">
        <img src="" alt="" />
        <div class="case-img-controls">
          <button class="case-img-btn" onclick="caseImgNav(-1)">[◄ PREV]</button>
          <div class="case-img-counter"></div>
          <button class="case-img-btn" onclick="caseImgNav(1)">[NEXT ►]</button>
        </div>
      </div>
      <div class="case-details"></div>
      <div class="case-description"></div>
    </div>
  </div>

  <!-- Audio -->
  <audio id="hum" src="uscss-sitesounds/alien ambience webiste.mp3" loop></audio>
  <audio id="blip" src="uscss-sitesounds/Flick.mp3"></audio>

  <!-- Scripts -->
  <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
  <script src="lib/barba.min.js"></script>
  <script src="js/shared.js?v=5"></script>
  <script src="js/scene.js?v=5"></script>
  <script src="js/channel-sweep.js?v=5"></script>

</body>
</html>
